<section id="projects" class="projects-section">
  <div class="container">
    <div class="section-header">
      <span class="subtitle">Portfólio</span>
      <h2 class="title">Projetos em <span class="accent-text">Destaque</span></h2>
    </div>

    <div class="projects-grid">
      @for (project of projects; track project.title) {
        <div class="project-card">
          <div class="project-image">
            <div class="overlay">
              <div class="tags">
                @for (tag of project.tags; track tag) {
                  <span class="tag">{{ tag }}</span>
                }
              </div>
            </div>
            <div class="placeholder-img">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path [attr.d]="project.icon"></path>
              </svg>
            </div>
          </div>
          <div class="project-info">
            <h3 class="project-title">{{ project.title }}</h3>
            <p class="project-desc">{{ project.description }}</p>
            <ul class="project-features">
              @for (feature of project.features; track feature) {
                <li><span class="bullet"></span> {{ feature }}</li>
              }
            </ul>
          </div>
        </div>
      }
    </div>
  </div>
</section>
