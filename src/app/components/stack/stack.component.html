<section id="stack" class="stack-section">
  <div class="container">
    <div class="section-header centered">
      <span class="subtitle">Tecnologias</span>
      <h2 class="title">Minha <span class="accent-text">Stack</span></h2>
    </div>

    <div class="stack-grid">
      @for (tech of stack; track tech.name) {
        <div class="tech-item">
          <div class="tech-icon-box">
             <span class="tech-name">{{ tech.name }}</span>
          </div>
          <div class="tech-bar">
            <div class="tech-progress" [style.width]="tech.level + '%'"></div>
          </div>
        </div>
      }
    </div>
    
    <div class="tech-badges">
      @for (badge of badges; track badge) {
        <span class="badge">{{ badge }}</span>
      }
    </div>
  </div>
</section>
