<header [class.scrolled]="isScrolled">
  <nav class="container">
    <div class="logo">
      <span class="accent-text">M</span>ateus de <span class="accent-text">J</span>esus
    </div>
    
    <div class="nav-links" [class.mobile-active]="isMobileMenuActive">
      <a href="#hero" (click)="closeMobileMenu()">Home</a>
      <a href="#about" (click)="closeMobileMenu()">Sobre</a>
      <a href="#projects" (click)="closeMobileMenu()">Projetos</a>
      <a href="#experience" (click)="closeMobileMenu()">Experiência</a>
      <a href="#qualifications" (click)="closeMobileMenu()">Certificações</a>
      <a href="#contact" (click)="closeMobileMenu()">Contato</a>
    </div>

    <div class="actions">
      <button class="theme-toggle" (click)="toggleTheme()" [title]="themeService.isDark ? 'Modo Claro' : 'Modo Escuro'">
        @if (themeService.isDark) {
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        }
      </button>

      <button class="mobile-menu-btn" (click)="toggleMobileMenu()" [class.active]="isMobileMenuActive">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>
  <div class="scroll-progress" [style.width.%]="scrollProgress"></div>
</header>
